on:
  workflow_call:
    inputs:
      image_name:
        required: false
        type: string
        description: "Name of the Docker image."
      context:
        required: true
        type: string
        description: "Path to the Docker build context (e.g., ./apps/actions-runner)"
      dockerfile:
        required: true
        type: string
        description: "Path to the Dockerfile (e.g., ./apps/actions-runner/Dockerfile)"

      platforms:
        required: false
        type: string
        description: "Comma-separated list of target platforms for multi-arch builds (default: linux/amd64,linux/arm64)"
        default: "linux/amd64,linux/arm64"

      publish:
        required: false
        type: boolean
        description: "Whether to push the built image to the registry (default: true)"
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU and Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          echo "IMAGE_REG=ghcr.io/${{ github.repository_owner }}" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}"
          TAGS="${IMAGE}:latest
          ${IMAGE}:${{ github.sha }}"

          if [[ "${{ inputs.publish }}" == "true" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS="${TAGS}
          ${IMAGE}:${GITHUB_REF#refs/tags/}"
          fi

          {
            echo "TAGS<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.publish }}
          tags: ${{ steps.meta.outputs.TAGS }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}

      - name: Output published image names
        run: |
          echo "Published:"
          echo "${{ steps.meta.outputs.TAGS }}"
